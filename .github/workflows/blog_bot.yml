name: Naver Blog Automation Agent

on:
  push: 
    branches:
  schedule:
    - cron: '30 3 * * *'  # 매일 UTC 03:30 (한국 점심 - 답글/피드)
    - cron: '0 11 * * *'  # 매일 UTC 11:00 (한국 저녁 - 답글/피드)
    - cron: '0 0 1 * *'   # 매월 1일 UTC 00:00 (한국 오전 9시 - 대청소/유령정리)
    - cron: '0 23 * * *'  # [신규] 매일 UTC 23:00 (한국 오전 8시 - 서이추 문지기)
    - cron: '0 9 * * *'   # [신규] 매일 UTC 09:00 (한국 오후 6시 - 서이추 문지기)
  workflow_dispatch:
    inputs:
      bot_type:
        description: '실행할 봇 종류'
        required: true
        default: 'all'
      # 💡 [추가됨] Cloudflare에서 보내는 치환용 데이터들을 받을 문을 열어줍니다!
      param_title:
        description: '블로그 제목'
        required: false
      param_intro:
        description: '도입부'
        required: false
      param_info:
        description: '가게 정보'
        required: false
      param_exterior:
        description: '외부 전경'
        required: false
      param_taste:
        description: '메뉴 및 맛평가'
        required: false
      param_outro:
        description: '마무리 총평'
        required: false

jobs:
  run-blog-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 소스 코드 가져오기
        uses: actions/checkout@v3
        
      - name: ⚙️ Node.js 세팅 (버전 22)
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          
      - name: 📦 패키지 설치
        run: npm install
        
      - name: 🌐 Playwright 브라우저 설치
        run: npx playwright install chromium --with-deps
        
      - name: 🔑 안전한 로그인 세션 생성
        run: echo '${{ secrets.NAVER_STATE_JSON }}' > state.json
        
      # =================================================================
      # 🚀 1. 점심/저녁 에이전트 (답글 & 피드 순회)
      # =================================================================
      - name: 🚀 점심/저녁 에이전트 실행
        if: github.event_name == 'push' || github.event.schedule == '30 3 * * *' || github.event.schedule == '0 11 * * *' || (github.event_name == 'workflow_dispatch' && inputs.bot_type == 'all')
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "=== 1부: 내 블로그 답글 달기 시작 ==="
          node reply_agent.js
          
          echo "=== 2부: 이웃 새글 순회 시작 ==="
          node feed_agent.js

      # =================================================================
      # 🧹 2. 월간 이웃 대청소 에이전트
      # =================================================================
      - name: 🧹 월간 이웃 대청소 에이전트 실행
        if: github.event.schedule == '0 0 1 * *' || (github.event_name == 'workflow_dispatch' && inputs.bot_type == 'clean')
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "=== 3부: 월간 이웃 대청소 시작 ==="
          node clean_agent.js
          
      # =================================================================
      # 🏰 3. 서이추 문지기 실행 (매일 오전 8시 / 오후 6시 2회 작동)
      # =================================================================
      - name: 🏰 서이추 문지기 실행
        if: github.event.schedule == '0 23 * * *' || github.event.schedule == '0 9 * * *' || (github.event_name == 'workflow_dispatch' && inputs.bot_type == 'gatekeeper')
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NAVER_BLOG_ID: ${{ secrets.NAVER_BLOG_ID }} 
        run: |
          echo "=== 4부: 서이추 문지기 시작 ==="
          node gatekeeper_agent.js
          
      # =================================================================
      # 👻 4. 유령 이웃 정리 (매월 1일 자동 & 수동 호출)
      # =================================================================
      - name: 👻 유령 이웃 정리 실행
        if: github.event.schedule == '0 0 1 * *' || (github.event_name == 'workflow_dispatch' && inputs.bot_type == 'organize')
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NAVER_BLOG_ID: ${{ secrets.NAVER_BLOG_ID }}
        run: |
          echo "=== 5부: 유령 이웃 정리 시작 ==="
          node organize_agent.js

      # =================================================================
      # 📝 [신규] 5. 블로그 자동 포스팅 에이전트 (Cloudflare 연동)
      # =================================================================
      - name: 📝 블로그 포스팅 에이전트 실행
        if: github.event_name == 'workflow_dispatch' && inputs.bot_type == 'blog_upload'
        env:
          # Cloudflare가 넘겨준 파라미터(inputs)를 Node.js 환경변수로 변환하여 꽂아줍니다!
          AI_TITLE: ${{ inputs.param_title }}
          AI_INTRO: ${{ inputs.param_intro }}
          AI_INFO: ${{ inputs.param_info }}
          AI_EXTERIOR: ${{ inputs.param_exterior }}
          AI_TASTE: ${{ inputs.param_taste }}
          AI_OUTRO: ${{ inputs.param_outro }}
        run: |
          echo "=== 6부: 템플릿 기반 블로그 자동 포스팅 시작 ==="
          node post_agent.js