name: Naver Blog Automation Agent

on:
  push: # 💡 파일이 올라오면 강제로 스케줄러를 깨우는 알람입니다!
    branches: [ main, master ]
  schedule:
    - cron: '30 3 * * *' # 매일 UTC 03:30 (한국 점심)
    - cron: '0 11 * * *' # 매일 UTC 11:00 (한국 저녁)
    - cron: '0 0 1 * *'  # 💡 추가: 매월 1일 UTC 00:00 (한국 시간 오전 9시) 대청소용!
  workflow_dispatch:

jobs:
  run-blog-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 소스 코드 가져오기
        uses: actions/checkout@v3
        
      - name: ⚙️ Node.js 세팅 (버전 22)
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          
      - name: 📦 패키지 설치
        run: npm install
        
      - name: 🌐 Playwright 브라우저 설치
        run: npx playwright install chromium --with-deps
        
      - name: 🔑 안전한 로그인 세션 생성
        run: echo '${{ secrets.NAVER_STATE_JSON }}' > state.json
        
      # =================================================================
      # 🚀 기존: 매일 2회 도는 점심/저녁 에이전트 (답글 & 피드 순회)
      # =================================================================
      - name: 🚀 점심/저녁 에이전트 실행
        if: github.event.schedule == '30 3 * * *' || github.event.schedule == '0 11 * * *' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "=== 1부: 내 블로그 답글 달기 시작 ==="
          node reply_agent.js
          
          echo "=== 2부: 이웃 새글 순회 시작 ==="
          node feed_agent.js

      # =================================================================
      # 🧹 신규: 한 달에 한 번 도는 이웃 대청소 에이전트
      # =================================================================
      - name: 🧹 월간 이웃 대청소 에이전트 실행
        if: github.event.schedule == '0 0 1 * *' || github.event_name == 'workflow_dispatch'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "=== 3부: 월간 이웃 대청소 시작 ==="
          node clean_agent.js
          
      # =================================================================
      # 🏰 신규: 이틀에 한 번 도는 서이추 문지기 실행
      # =================================================================
      - name: 🏰 서이추 문지기 실행 (이틀 주기)
        if: github.event.schedule == '0 15 */2 * *' || github.event_name == 'workflow_dispatch'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "=== 4부: 서이추 문지기 시작 ==="
          node gatekeeper_agent.js