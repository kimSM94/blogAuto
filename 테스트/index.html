<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>블로그 포스팅 도우미</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    body { font-family: 'Pretendard', sans-serif; background-color: #f2f4f6; }
    .toss-input { background-color: #f2f4f6; transition: background-color 0.2s ease; }
    .toss-input:focus { background-color: #ffffff; box-shadow: inset 0 0 0 2px #3182f6; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 antialiased">
  <div class="bg-white w-full max-w-md rounded-[24px] p-6 shadow-sm">
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-gray-900 mb-2">오늘의 맛집 기록 ✍️</h1>
      <p class="text-gray-500 text-sm">가게 이름만 적어주세요.<br>나머지 정보는 봇이 네이버에서 알아서 찾아옵니다!</p>
    </div>

    <form id="postForm" class="space-y-5">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2" for="storeName">가게 이름</label>
        <input type="text" id="storeName" required placeholder="예) 문래 사노" 
               class="toss-input w-full rounded-[16px] p-4 text-gray-900 outline-none">
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2" for="experience">특징 및 느낀 점</label>
        <textarea id="experience" rows="4" required placeholder="예) 잠봉트러플세트 미쳤음, 오렌지색 인테리어 이쁨" 
                  class="toss-input w-full rounded-[16px] p-4 text-gray-900 outline-none resize-none"></textarea>
      </div>
      <button type="submit" id="submitBtn" 
              class="w-full bg-[#3182f6] hover:bg-[#1b64da] text-white font-bold text-lg rounded-[16px] py-4 mt-4 transition-colors">
        알아서 검색하고 텔레그램으로 받기
      </button>
    </form>
    <div id="statusMessage" class="mt-4 text-center text-sm font-medium text-gray-500 hidden"></div>
  </div>

  <script>
    document.getElementById('postForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const storeName = document.getElementById('storeName').value;
      const experience = document.getElementById('experience').value;
      const submitBtn = document.getElementById('submitBtn');
      const statusMessage = document.getElementById('statusMessage');

      submitBtn.disabled = true;
      submitBtn.textContent = '봇이 네이버를 검색 중이에요... 🔍';
      submitBtn.classList.replace('bg-[#3182f6]', 'bg-gray-300');
      statusMessage.classList.add('hidden');

      try {
        const response = await fetch("https://ai-blog-bot.rnentkdals.workers.dev/api/send-telegram", {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ storeName, experience })
        });

        if (response.ok) {
          statusMessage.textContent = '✅ 정보 검색 & 텔레그램 전송 완료!';
          statusMessage.classList.replace('text-red-500', 'text-blue-500');
          document.getElementById('postForm').reset();
        } else { throw new Error('서버 에러'); }
      } catch (error) {
        statusMessage.textContent = '❌ 전송에 실패했어요.';
        statusMessage.classList.replace('text-blue-500', 'text-red-500');
      } finally {
        statusMessage.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = '알아서 검색하고 텔레그램으로 받기';
        submitBtn.classList.replace('bg-gray-300', 'bg-[#3182f6]');
      }
    });
  </script>
</body>
</html>
