<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <!-- 💡 모바일 최적화: 확대/축소 방지 및 앱처럼 꽉 차게 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>내 자동화 포털</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body { 
      font-family: 'Pretendard', sans-serif; 
      background-color: #F2F4F6; /* 토스 앱 배경색 */
      -webkit-tap-highlight-color: transparent; /* 모바일 터치 시 파란 깜빡임 제거 */
    }
  </style>
</head>
<body class="flex justify-center min-h-screen">

  <!-- 📱 스마트폰 화면 컨테이너 -->
  <div class="w-full max-w-md bg-[#F2F4F6] min-h-screen flex flex-col">
    
    <!-- 텍스트 헤더 -->
    <div class="pt-14 pb-6 px-6">
      <h1 class="text-[26px] font-bold text-[#191F28] leading-[1.4] tracking-tight">어떤 작업을<br>시작할까요?</h1>
    </div>
    
    <!-- 메뉴 리스트 영역 -->
    <div class="px-5 space-y-3 pb-10">
      
      <!-- 🍔 맛집 봇 -->
      <a href="food.html" class="flex items-center p-5 bg-white rounded-[20px] shadow-[0_2px_10px_rgba(0,0,0,0.02)] active:bg-gray-50 transition-colors">
        <div class="w-[52px] h-[52px] flex-shrink-0 bg-[#E8F3FF] rounded-[16px] flex items-center justify-center text-2xl mr-4">🍔</div>
        <div class="flex-grow">
          <h2 class="text-[17px] font-bold text-[#333D4B] mb-0.5">맛집 봇</h2>
          <p class="text-[13px] text-[#8B95A1] font-medium leading-snug">정보를 입력하고 초안 받기</p>
        </div>
        <div class="text-[#D1D6DB]">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </div>
      </a>

      <!-- 🏰 서이추 문지기 -->
      <a href="bot.html?type=gatekeeper" class="flex items-center p-5 bg-white rounded-[20px] shadow-[0_2px_10px_rgba(0,0,0,0.02)] active:bg-gray-50 transition-colors">
        <div class="w-[52px] h-[52px] flex-shrink-0 bg-[#F2F3FF] rounded-[16px] flex items-center justify-center text-2xl mr-4">🏰</div>
        <div class="flex-grow">
          <h2 class="text-[17px] font-bold text-[#333D4B] mb-0.5">서이추 문지기</h2>
          <p class="text-[13px] text-[#8B95A1] font-medium leading-snug">광고 계정 컷! 찐이웃 수락</p>
        </div>
        <div class="text-[#D1D6DB]">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </div>
      </a>

      <!-- 🧹 이웃 대청소 -->
      <a href="bot.html?type=clean" class="flex items-center p-5 bg-white rounded-[20px] shadow-[0_2px_10px_rgba(0,0,0,0.02)] active:bg-gray-50 transition-colors">
        <div class="w-[52px] h-[52px] flex-shrink-0 bg-[#FFF0F0] rounded-[16px] flex items-center justify-center text-2xl mr-4">🧹</div>
        <div class="flex-grow">
          <h2 class="text-[17px] font-bold text-[#333D4B] mb-0.5">이웃 대청소</h2>
          <p class="text-[13px] text-[#8B95A1] font-medium leading-snug">기존 이웃 중 광고 계정 격리</p>
        </div>
        <div class="text-[#D1D6DB]">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </div>
      </a>
      <a href="bot.html?type=organize" class="flex items-center p-5 bg-white rounded-[20px] shadow-[0_2px_10px_rgba(0,0,0,0.02)] active:bg-gray-50 transition-colors">
        <div class="w-[52px] h-[52px] flex-shrink-0 bg-[#F4F4F6] rounded-[16px] flex items-center justify-center text-2xl mr-4">👻</div>
        <div class="flex-grow">
          <h2 class="text-[17px] font-bold text-[#333D4B] mb-0.5">유령 이웃 정리</h2>
          <p class="text-[13px] text-[#8B95A1] font-medium leading-snug">1년 이상 미활동 서로이웃 강등</p>
        </div>
        <div class="text-[#D1D6DB]">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </div>
      </a>

    </div>
  </div>

</body>
</html>
